name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest
      - run: uv run ruff check src tests scripts
      - run: uv build

  package-smoke:
    name: Package Smoke (${{ matrix.os }} / ${{ matrix.installer }} / ${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.13"
            installer: pip
            artifact: wheel
            artifact-glob: dist/*.whl
          - os: ubuntu-latest
            python-version: "3.13"
            installer: pip
            artifact: sdist
            artifact-glob: dist/*.tar.gz
          - os: macos-latest
            python-version: "3.13"
            installer: pip
            artifact: wheel
            artifact-glob: dist/*.whl
          - os: windows-latest
            python-version: "3.13"
            installer: pip
            artifact: wheel
            artifact-glob: dist/*.whl
          - os: ubuntu-latest
            python-version: "3.13"
            installer: pipx
            artifact: wheel
            artifact-glob: dist/*.whl
          - os: macos-latest
            python-version: "3.13"
            installer: pipx
            artifact: wheel
            artifact-glob: dist/*.whl
          - os: windows-latest
            python-version: "3.13"
            installer: pipx
            artifact: wheel
            artifact-glob: dist/*.whl
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/omnivorous/models
          key: fastembed-${{ runner.os }}-intfloat-multilingual-e5-large
      - run: uv build
      - run: python scripts/package_smoke.py --artifact-glob "${{ matrix.artifact-glob }}" --installer "${{ matrix.installer }}"
