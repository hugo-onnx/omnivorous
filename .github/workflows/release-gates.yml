name: Release Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      UV_PYTHON: "3.13"
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/omnivorous/models
          key: fastembed-${{ runner.os }}-intfloat-multilingual-e5-large
      - run: uv sync --extra dev
      - run: uv run omni tests/fixtures -o "${RUNNER_TEMP}/omnivorous-semantic-warmup"
      - run: uv run python scripts/release_gates.py --source evals/release_corpus --retrieval-cases evals/retrieval_cases.json
