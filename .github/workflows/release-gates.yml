name: Release Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      UV_PYTHON: "3.13"
      OMNIVOROUS_EMBEDDING_CACHE_DIR: ${{ github.workspace }}/.cache/omnivorous/vectors
      OMNIVOROUS_EMBEDDING_MODEL_CACHE_DIR: ${{ github.workspace }}/.cache/omnivorous/models
      OMNIVOROUS_EMBEDDING_LOCAL_FILES_ONLY: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ${{ env.OMNIVOROUS_EMBEDDING_MODEL_CACHE_DIR }}
          key: fastembed-${{ runner.os }}-bge-small-en-v1.5
      - run: uv sync --extra dev --extra semantic
      - run: uv run omni warm-embeddings --cache-dir "${OMNIVOROUS_EMBEDDING_MODEL_CACHE_DIR}"
      - run: uv run python scripts/release_gates.py --source test-docs --retrieval-cases evals/retrieval_cases.json --semantic-smoke-source tests/fixtures --embedding-cache-dir "${OMNIVOROUS_EMBEDDING_CACHE_DIR}" --embedding-model-cache-dir "${OMNIVOROUS_EMBEDDING_MODEL_CACHE_DIR}"
